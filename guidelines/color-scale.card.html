<!-- @dsCard group="Colors" viewport="700x150" name="Monochrome Scale" subtitle="공통 4자산 — 표시유형 비분기 모노크롬 팔레트" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family); background: var(--white); }
  .wrap { padding: 20px 24px; }
  .row { display: flex; gap: 0; }
  .sw { flex: 1; height: 64px; display: flex; align-items: flex-end; }
  .meta { display: flex; gap: 0; margin-top: 8px; }
  .m { flex: 1; font-size: 10px; line-height: 1.4; color: var(--gray-500); letter-spacing: 0; }
  .m b { display: block; color: var(--text-primary); font-weight: 600; font-size: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#0D0D0D"></div>
    <div class="sw" style="background:#1A1A1A"></div>
    <div class="sw" style="background:#2A2A2A"></div>
    <div class="sw" style="background:#404040"></div>
    <div class="sw" style="background:#525252"></div>
    <div class="sw" style="background:#737373"></div>
    <div class="sw" style="background:#A3A3A3"></div>
    <div class="sw" style="background:#D4D4D4"></div>
    <div class="sw" style="background:#E8E8E8"></div>
    <div class="sw" style="background:#F5F5F5"></div>
    <div class="sw" style="background:#FAFAFA;border:1px solid #E8E8E8"></div>
    <div class="sw" style="background:#FFFFFF;border:1px solid #E8E8E8"></div>
  </div>
  <div class="meta">
    <div class="m"><b>deep</b>0D0D0D</div>
    <div class="m"><b>black</b>1A1A1A</div>
    <div class="m"><b>800</b>2A2A2A</div>
    <div class="m"><b>700</b>404040</div>
    <div class="m"><b>600</b>525252</div>
    <div class="m"><b>500</b>737373</div>
    <div class="m"><b>400</b>A3A3A3</div>
    <div class="m"><b>300</b>D4D4D4</div>
    <div class="m"><b>200</b>E8E8E8</div>
    <div class="m"><b>100</b>F5F5F5</div>
    <div class="m"><b>50</b>FAFAFA</div>
    <div class="m"><b>white</b>FFFFFF</div>
  </div>
</div>
</body>
</html>
