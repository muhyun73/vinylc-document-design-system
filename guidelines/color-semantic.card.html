<!-- @dsCard group="Colors" viewport="700x180" name="Semantic Roles" subtitle="surface · text · border 의미 토큰" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family); background: var(--white); }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .col h4 { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--gray-400); margin: 0 0 10px; }
  .item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .chip { width: 26px; height: 26px; flex: none; border: 1px solid var(--border-default); }
  .t { font-size: 12px; line-height: 1.3; }
  .t b { display: block; font-weight: 600; color: var(--text-primary); }
  .t span { color: var(--gray-500); font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="col">
    <h4>Surface</h4>
    <div class="item"><span class="chip" style="background:var(--surface-primary)"></span><span class="t"><b>primary</b><span>white</span></span></div>
    <div class="item"><span class="chip" style="background:var(--surface-inverse)"></span><span class="t"><b>inverse</b><span>black-deep</span></span></div>
    <div class="item"><span class="chip" style="background:var(--surface-subtle)"></span><span class="t"><b>subtle</b><span>gray-50</span></span></div>
    <div class="item"><span class="chip" style="background:var(--surface-muted)"></span><span class="t"><b>muted</b><span>gray-100</span></span></div>
  </div>
  <div class="col">
    <h4>Text</h4>
    <div class="item"><span class="chip" style="background:var(--text-primary)"></span><span class="t"><b>primary</b><span>black</span></span></div>
    <div class="item"><span class="chip" style="background:var(--text-secondary)"></span><span class="t"><b>secondary</b><span>gray-600</span></span></div>
    <div class="item"><span class="chip" style="background:var(--text-tertiary)"></span><span class="t"><b>tertiary</b><span>gray-400</span></span></div>
    <div class="item"><span class="chip" style="background:var(--text-inverse);border-color:var(--gray-300)"></span><span class="t"><b>inverse</b><span>white</span></span></div>
  </div>
  <div class="col">
    <h4>Border</h4>
    <div class="item"><span class="chip" style="background:var(--border-strong)"></span><span class="t"><b>strong</b><span>black</span></span></div>
    <div class="item"><span class="chip" style="background:var(--border-default)"></span><span class="t"><b>default</b><span>gray-200</span></span></div>
    <div class="item"><span class="chip" style="background:var(--border-subtle)"></span><span class="t"><b>subtle</b><span>gray-100</span></span></div>
    <div class="item"><span class="chip" style="background:var(--accent)"></span><span class="t"><b>accent</b><span>black-deep</span></span></div>
  </div>
</div>
</body>
</html>
