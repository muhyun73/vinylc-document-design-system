<!DOCTYPE html>
<html lang="ko">
<head>

  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--gray-100); padding: 8px 0; }

<body>
<div class="report"><div class="wrap">
  <div class="line"><span class="tag">display · 44 / 700</span><span style="font-size:var(--fs-display);font-weight:var(--fw-bold);line-height:1.1">바이널씨 보고서</span></div>
  <div class="line"><span class="tag">h1 · 34 / 700</span><span style="font-size:var(--fs-h1);font-weight:var(--fw-bold)">AI Native 전환</span></div>
  <div class="line"><span class="tag">h2 · 26 / 700</span><span style="font-size:var(--fs-h2);font-weight:var(--fw-bold)">섹션 제목</span></div>
  <div class="line"><span class="tag">h3 · 20 / 600</span><span style="font-size:var(--fs-h3);font-weight:var(--fw-semibold)">서브섹션 제목</span></div>
