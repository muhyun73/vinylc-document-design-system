<!-- @dsCard group="Colors" viewport="700x150" name="검정 카드 시각언어" subtitle="공통 4자산 — callout / dark card / inverse cover" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family); background: var(--gray-50); }
  .wrap { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .blk { background: var(--black-deep); color: #fff; padding: 16px; }
  .blk .k { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 8px; }
  .blk .ti { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .blk .bd { font-size: 12px; line-height: 1.5; color: var(--gray-400); }
</style>
</head>
<body>
<div class="wrap">
  <div class="blk"><div class="k">callout</div><div class="ti">핵심 메시지</div><div class="bd">본문 결론을 검정 배경으로 강조한다.</div></div>
  <div class="blk"><div class="k">dark card</div><div class="ti">그리드 셀</div><div class="bd">grid-card--dark 상단 흰 보더.</div></div>
  <div class="blk"><div class="k">inverse cover</div><div class="ti">표지 · 클로징</div><div class="bd">표지/종결 영역의 반전 표면.</div></div>
</div>
</body>
</html>
