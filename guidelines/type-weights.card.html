<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family); background: var(--white); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 4px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-size: 11px; color: var(--gray-400); width: 130px; flex: none; }
  .sp { font-size: 27px; color: var(--text-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="line"><span class="tag">Light · 300</span><span class="sp" style="font-weight:300">바이널씨 Practical UX</span></div>
  <div class="line"><span class="tag">Regular · 400</span><span class="sp" style="font-weight:400">바이널씨 Practical UX</span></div>
  <div class="line"><span class="tag">Medium · 500</span><span class="sp" style="font-weight:500">바이널씨 Practical UX</span></div>
  <div class="line"><span class="tag">Semibold · 600</span><span class="sp" style="font-weight:600">바이널씨 Practical UX</span></div>
  <div class="line"><span class="tag">Bold · 700</span><span class="sp" style="font-weight:700">바이널씨 Practical UX</span></div>
</div>
</body>
</html>
